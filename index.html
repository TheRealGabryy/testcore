<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiffusionStudio Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/playground/index.css">
</head>
<body>
  <div id="editor">
    <div id="main">
      <nav id="icon-sidebar"></nav>
      <aside id="left-panel"></aside>
      <div id="center">
        <div id="preview-area">
          <div id="player-container">
            <div id="player"></div>
            <div id="export-progress" style="display:none">
              <div class="progress-overlay">
                <div class="progress-ring-wrap">
                  <svg class="progress-ring-svg" viewBox="0 0 80 80">
                    <circle class="progress-track" cx="40" cy="40" r="32"/>
                    <circle class="progress-fill" id="progress-fill-circle" cx="40" cy="40" r="32"/>
                  </svg>
                  <span id="progress-pct">0%</span>
                </div>
                <p class="progress-label">Rendering video...</p>
                <button id="cancel-export-btn" class="btn-ghost">Cancel</button>
              </div>
            </div>
          </div>
        </div>
        <div id="playback-bar"></div>
        <div id="timeline-controls-bar"></div>
        <div id="timeline-area"></div>
      </div>
      <aside id="right-panel"></aside>
    </div>
  </div>
  <script type="module" src="/playground/main.ts"></script>
</body>
</html>
